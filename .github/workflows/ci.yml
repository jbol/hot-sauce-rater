# CI — runs on every push to main and every pull request.
# Also callable from other workflows (the release deploy reuses it as its gate).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm (pinned via packageManager)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      # dist/ is committed on purpose (the VPS serves it without building).
      # If a src/ change was pushed without rebuilding, fail loudly here
      # instead of silently shipping a stale UI on the next deploy.
      - name: Ensure committed dist/ matches the source
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::error::dist/ is stale — run 'pnpm build' locally and commit the result."
            git status --porcelain -- dist
            git diff --stat -- dist | tail -5
            exit 1
          fi
          echo "dist/ is up to date ✓"
