# nginx reverse proxy for Pasaporte Picante.
#
# The Node app listens on 127.0.0.1:3001 (localhost only) and serves BOTH the
# API and the built frontend. nginx is the public front door on 80/443.
#
# Install on the VPS:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/hot-sauce-passport
#   sudo ln -s /etc/nginx/sites-available/hot-sauce-passport /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default      # drop the "Welcome to nginx" page
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS with:  sudo certbot --nginx -d __DOMAIN__ -d www.__DOMAIN__
# certbot rewrites this file to add the TLS (443) block and an HTTP→HTTPS redirect.
#
# Replace __DOMAIN__ with your real domain before installing.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Long-cache the content-hashed build assets.
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → the Node app (API + SPA).
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
